<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeek's Digital Garden</title>
  <meta name="description" content="A digital garden for thoughts, ideas, and explorations.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
</head>
<body>
  <div class="app">
    <!-- === SIDEBAR NAVIGATION === -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">Jeek</div>
      <div class="logo-subtitle">Digital Garden</div>

      <nav class="nav">
        <a href="#" class="nav-item active" data-page="home">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Home</span>
        </a>
        <a href="#/slides" class="nav-item" data-page="slides">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span>Slides</span>
        </a>
        <a href="#/about" class="nav-item" data-page="about">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>About</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="https://github.com/jeekeagle" target="_blank">GitHub</a>
      </div>
    </aside>

    <!-- === MOBILE MENU TOGGLE === -->
    <button class="mobile-menu-toggle" id="menuToggle" aria-label="Toggle menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- === MAIN CONTENT === -->
    <main class="main">
      <!-- === HOME PAGE === -->
      <section class="page active" id="page-home">
        <div class="content">
          <header style="margin-bottom: var(--space-2xl);">
            <h1 class="fade-in">Flow <span class="accent">Space</span></h1>
            <p class="fade-in stagger-1" style="margin-top: var(--space-md);">
              一个有机生长的数字空间，记录思考、探索和创造。
            </p>
          </header>

          <!-- Timeline (dynamically loaded from posts/) -->
          <div class="timeline fade-in stagger-2">
            <!-- Articles will be loaded here by app.js -->
          </div>
        </div>
      </section>

      <!-- === SLIDES PAGE === -->
      <section class="page" id="page-slides">
        <div class="content">
          <header style="margin-bottom: var(--space-xl);">
            <h1>Slides</h1>
            <p class="muted" style="margin-top: var(--space-sm);">
              可视化的想法演示，点击进入全屏模式。
            </p>
          </header>

          <div class="slides-grid">
            <div class="slide-card" data-slide="flow-not-rules">
              <div class="slide-card-preview">
                <div class="slide-card-number">01</div>
                <div class="slide-card-title">Flow, Not Rules</div>
              </div>
              <div class="slide-card-overlay">
                <span class="slide-card-date">2024.03</span>
                <span class="slide-card-slides">6 slides</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- === ABOUT PAGE === -->
      <section class="page" id="page-about">
        <div class="content">
          <div class="about-content">
            <div class="about-avatar">🌊</div>
            <h1 class="about-name">Jeek</h1>
            <p class="about-bio">
              Builder, thinker, explorer.<br>
              热爱构建、思考和探索。
            </p>
            <div class="about-links">
              <a href="https://github.com/jeekeagle" target="_blank" class="about-link" title="GitHub">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
              </a>
            </div>
          </div>
        </div>
      </section>

      <!-- === ARTICLE PAGE (dynamically loaded) === -->
      <section class="page" id="page-article">
        <div class="content">
          <div class="reading-progress">
            <div class="reading-progress-bar" id="readingProgress"></div>
          </div>

          <article>
            <header class="article-header">
              <div class="article-meta">
                <span class="article-date" id="articleDate"></span>
                <span class="article-tag" id="articleTag"></span>
              </div>
              <h1 id="articleTitle"></h1>
            </header>

            <div class="article-content" id="articleContent">
              <!-- Markdown content rendered here -->
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <!-- === SLIDE OVERLAY (fullscreen slides) === -->
  <div id="slideOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: var(--bg-primary);">
    <button id="closeSlides" style="position: absolute; top: 20px; right: 20px; background: var(--card-bg); border: 1px solid var(--border); color: var(--fg-primary); padding: 10px 20px; border-radius: 8px; cursor: pointer; z-index: 1001;">ESC 关闭</button>
    <iframe id="slideFrame" style="width: 100%; height: 100%; border: none;"></iframe>
  </div>

  <!-- === SCRIPTS === -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
